name: Debug RustDesk Build Issues

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Vollständige Diagnose was schiefgeht
  diagnose-build-issues:
    name: Diagnose Build Issues
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.75.0"

    - name: Complete project analysis
      run: |
        echo "🔍 VOLLSTÄNDIGE PROJEKTANALYSE"
        echo "=============================="
        
        echo ""
        echo "📁 Repository Root:"
        ls -la
        
        echo ""
        echo "📋 Alle Cargo.toml Dateien:"
        find . -name "Cargo.toml" -type f | while read file; do
          echo "  📄 $file"
          echo "    Inhalt der ersten 20 Zeilen:"
          head -20 "$file" | sed 's/^/      /'
          echo ""
        done
        
        echo ""
        echo "🔍 Rust Source Struktur:"
        find . -name "*.rs" -type f | head -20 | while read file; do
          echo "  🦀 $file"
        done
        
        echo ""
        echo "📡 Config-Dateien Analyse:"
        find . -name "config.rs" -type f | while read file; do
          echo "  📄 $file"
          echo "    Relevant content:"
          grep -n "RENDEZVOUS\|PUB_KEY\|SERVER" "$file" | head -10 | sed 's/^/      /'
          echo ""
        done
        
        echo ""
        echo "🔧 Build Dependencies Check:"
        if [ -f "Cargo.toml" ]; then
          echo "  📋 Dependencies in root Cargo.toml:"
          grep -A 20 "\[dependencies\]" Cargo.toml | sed 's/^/    /'
        fi
        
        echo ""
        echo "🎯 Binaries definiert:"
        find . -name "Cargo.toml" -exec grep -l "\[\[bin\]\]" {} \; | while read file; do
          echo "  📄 $file:"
          grep -A 5 "\[\[bin\]\]" "$file" | sed 's/^/    /'
        done

    - name: Test basic cargo commands
      run: |
        echo "🧪 CARGO KOMMANDO TESTS"
        echo "======================"
        
        echo ""
        echo "📋 cargo version:"
        cargo version
        
        echo ""
        echo "🔍 cargo metadata (gekürzt):"
        if cargo metadata --no-deps --format-version 1 2>/dev/null; then
          echo "✅ Metadata erfolgreich gelesen"
        else
          echo "❌ Metadata fehlgeschlagen:"
          cargo metadata --no-deps --format-version 1 2>&1 | head -10
        fi
        
        echo ""
        echo "🏗️ cargo check (nur Syntax):"
        if cargo check 2>&1; then
          echo "✅ Cargo check erfolgreich"
        else
          echo "❌ Cargo check fehlgeschlagen"
        fi

    - name: Analyze specific build errors
      run: |
        echo "🚨 BUILD ERROR ANALYSE"
        echo "====================="
        
        echo ""
        echo "🔨 Versuche cargo build mit Details:"
        cargo build --verbose 2>&1 | tee build_output.log || true
        
        echo ""
        echo "📊 Build Output Analyse:"
        if [ -f "build_output.log" ]; then
          echo "  🔍 Fehler-Pattern:"
          grep -i "error\|failed\|cannot\|undefined" build_output.log | head -10 | sed 's/^/    /'
          
          echo ""
          echo "  📦 Fehlende Dependencies:"
          grep -i "could not find\|not found\|missing" build_output.log | head -5 | sed 's/^/    /'
          
          echo ""
          echo "  🔗 Linker Probleme:"
          grep -i "link\|ld\|library" build_output.log | head -5 | sed 's/^/    /'
        fi

    - name: Check secrets configuration
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: |
        echo "🔐 SECRETS KONFIGURATION"
        echo "======================="
        
        if [ -z "${{ secrets.RENDEZVOUS_SERVER }}" ]; then
          echo "❌ RENDEZVOUS_SERVER Secret NICHT gesetzt!"
          echo "   Gehe zu: Settings → Secrets and variables → Actions"
          echo "   Erstelle Secret: RENDEZVOUS_SERVER"
        else
          echo "✅ RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}"
        fi
        
        if [ -z "${{ secrets.RS_PUB_KEY }}" ]; then
          echo "❌ RS_PUB_KEY Secret NICHT gesetzt!"
          echo "   Gehe zu: Settings → Secrets and variables → Actions"
          echo "   Erstelle Secret: RS_PUB_KEY"
        else
          echo "✅ RS_PUB_KEY: $(echo "${{ secrets.RS_PUB_KEY }}" | cut -c1-20)..."
        fi

    - name: Try minimal fixes and build
      run: |
        echo "🔧 VERSUCHE MINIMALE FIXES"
        echo "========================="
        
        # Installiere weitere Dependencies die oft fehlen
        echo "📦 Installiere häufig fehlende Dependencies:"
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libssl-dev \
          libgtk-3-dev \
          libasound2-dev \
          libxcb-randr0-dev \
          libxdo-dev \
          libxfixes-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libudev-dev \
          cmake \
          build-essential
        
        echo ""
        echo "🔧 Konfiguriere Secrets falls gesetzt:"
        if [ -n "${{ secrets.RENDEZVOUS_SERVER }}" ] && [ -n "${{ secrets.RS_PUB_KEY }}" ]; then
          find . -name "config.rs" -type f | while read file; do
            if grep -q "RENDEZVOUS_SERVERS\|RS_PUB_KEY" "$file"; then
              echo "  🔧 Bearbeite $file"
              cp "$file" "$file.backup"
              
              # Vorsichtige Ersetzungen nur wenn Pattern existiert
              if grep -q "RENDEZVOUS_SERVERS" "$file"; then
                sed -i 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' "$file"
                echo "    ✅ RENDEZVOUS_SERVER konfiguriert"
              fi
              
              if grep -q "RS_PUB_KEY\|PUBLIC_RS_PUB_KEY" "$file"; then
                sed -i 's/pub const \(RS_PUB_KEY\|PUBLIC_RS_PUB_KEY\): &str = ".*";/pub const \1: \&str = "${{ secrets.RS_PUB_KEY }}";/' "$file"
                echo "    ✅ RS_PUB_KEY konfiguriert"
              fi
            fi
          done
        else
          echo "  ⚠️ Secrets nicht gesetzt, verwende Default-Werte"
        fi
        
        echo ""
        echo "🚀 Finaler Build-Versuch:"
        if cargo build --release 2>&1 | tee final_build.log; then
          echo "🎉 BUILD ERFOLGREICH!"
          
          echo ""
          echo "📦 Gebaute Dateien:"
          find target/release -type f -executable 2>/dev/null | while read file; do
            size=$(du -h "$file" | cut -f1)
            echo "  ✅ $file ($size)"
          done
        else
          echo "❌ Build fehlgeschlagen. Letzte Fehlermeldungen:"
          tail -20 final_build.log | sed 's/^/  /'
        fi

    - name: Upload build logs and any artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-analysis-logs
        path: |
          build_output.log
          final_build.log
          target/release/*
          **/*.backup
        if-no-files-found: warn

  # Schneller Windows Test 
  quick-windows-test:
    name: Quick Windows Test
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.75.0"

    - name: Quick analysis
      run: |
        Write-Host "🔍 Windows Quick Analysis"
        Write-Host "========================"
        
        Write-Host ""
        Write-Host "📁 Repository contents:"
        Get-ChildItem | Select-Object Name, Length
        
        Write-Host ""
        Write-Host "📋 Cargo.toml check:"
        if (Test-Path "Cargo.toml") {
          Write-Host "✅ Cargo.toml exists"
          Get-Content "Cargo.toml" | Select-Object -First 20
        } else {
          Write-Host "❌ No Cargo.toml found"
        }
        
        Write-Host ""
        Write-Host "🚀 Quick build test:"
        try {
          cargo build 2>&1 | Tee-Object -FilePath "windows_build.log"
          Write-Host "✅ Build command completed"
        } catch {
          Write-Host "❌ Build failed: $($_.Exception.Message)"
        }
        
        Write-Host ""
        Write-Host "📦 Any executables created:"
        if (Test-Path "target") {
          Get-ChildItem -Recurse "target" -Include "*.exe" | Select-Object FullName, Length
        } else {
          Write-Host "No target directory found"
        }
      shell: powershell

    - name: Upload Windows logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: windows-analysis-logs
        path: |
          windows_build.log
          target/**/*.exe
        if-no-files-found: warn
