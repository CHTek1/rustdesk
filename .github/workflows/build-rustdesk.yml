name: Build Custom RustDesk Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        override: true
        components: rustfmt, clippy
        
    - name: Install dependencies
      run: |
        # Windows-spezifische Dependencies
        choco install llvm
        
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Configure custom settings
      run: |
        # Setze die korrekten Umgebungsvariablen für RustDesk
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV
        
        # Zusätzlich: Modifiziere Konfigurationsdateien direkt
        # RustDesk sucht nach diesen Dateien für hardcoded Werte
        $configFiles = @("libs/hbb_common/src/config.rs", "src/config.rs")
        
        foreach ($configFile in $configFiles) {
          if (Test-Path $configFile) {
            Write-Host "Bearbeite $configFile..."
            
            # Rendezvous Server konfigurieren
            (Get-Content $configFile) -replace 'pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*?\];', "pub const RENDEZVOUS_SERVERS: &[&str] = &[`"${{ secrets.RENDEZVOUS_SERVER }}`"];" | Set-Content $configFile
            
            # Public Key konfigurieren (verschiedene mögliche Variablennamen)
            (Get-Content $configFile) -replace 'pub const PUBLIC_RS_PUB_KEY: &str = ".*?";', "pub const PUBLIC_RS_PUB_KEY: &str = `"${{ secrets.RS_PUB_KEY }}`";" | Set-Content $configFile
            (Get-Content $configFile) -replace 'pub const RS_PUB_KEY: &str = ".*?";', "pub const RS_PUB_KEY: &str = `"${{ secrets.RS_PUB_KEY }}`";" | Set-Content $configFile
            
            Write-Host "✅ $configFile konfiguriert"
          }
        }
      shell: powershell

    - name: Build RustDesk
      run: |
        cargo build --release
        
    - name: Build installer (Windows)
      run: |
        # Installer bauen falls verfügbar
        if (Test-Path "build.py") {
          python build.py --portable
        }
      shell: powershell
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-custom
        path: |
          target/release/rustdesk.exe
          target/release/*.exe

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libasound2-dev \
          libxcb-randr0-dev \
          libxdo-dev \
          libxfixes-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libudev-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev
          
    - name: Configure custom settings
      run: |
        # Konfiguration für Linux
        if [ -f "libs/hbb_common/src/config.rs" ]; then
          sed -i 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' libs/hbb_common/src/config.rs
          sed -i 's/pub const PUBLIC_RS_PUB_KEY: &str = ".*";/pub const PUBLIC_RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' libs/hbb_common/src/config.rs
          sed -i 's/pub const RS_PUB_KEY: &str = ".*";/pub const RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' libs/hbb_common/src/config.rs
          echo "✅ libs/hbb_common/src/config.rs konfiguriert"
        fi
        
        if [ -f "src/config.rs" ]; then
          sed -i 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' src/config.rs
          sed -i 's/pub const PUBLIC_RS_PUB_KEY: &str = ".*";/pub const PUBLIC_RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' src/config.rs
          sed -i 's/pub const RS_PUB_KEY: &str = ".*";/pub const RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' src/config.rs
          echo "✅ src/config.rs konfiguriert"
        fi
        
        # Umgebungsvariablen setzen (wichtig für Build-Process)
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV
        
    - name: Build RustDesk
      run: |
        cargo build --release
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-linux-custom
        path: |
          target/release/rustdesk

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
        
    - name: Configure custom settings
      run: |
        # Konfiguration für macOS
        if [ -f "libs/hbb_common/src/config.rs" ]; then
          sed -i '' 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' libs/hbb_common/src/config.rs
          sed -i '' 's/pub const PUBLIC_RS_PUB_KEY: &str = ".*";/pub const PUBLIC_RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' libs/hbb_common/src/config.rs
          sed -i '' 's/pub const RS_PUB_KEY: &str = ".*";/pub const RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' libs/hbb_common/src/config.rs
          echo "✅ libs/hbb_common/src/config.rs konfiguriert"
        fi
        
        if [ -f "src/config.rs" ]; then
          sed -i '' 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' src/config.rs
          sed -i '' 's/pub const PUBLIC_RS_PUB_KEY: &str = ".*";/pub const PUBLIC_RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' src/config.rs
          sed -i '' 's/pub const RS_PUB_KEY: &str = ".*";/pub const RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' src/config.rs
          echo "✅ src/config.rs konfiguriert"
        fi
        
        # Umgebungsvariablen setzen (wichtig für Build-Process)
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV
        
    - name: Build RustDesk
      run: |
        cargo build --release
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-macos-custom
        path: |
          target/release/rustdesk
