name: Build Custom RustDesk Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        # LLVM für Windows
        choco install llvm -y
        
        # vcpkg für Libraries
        git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat
        C:\vcpkg\vcpkg.exe install libvpx:x64-windows libyuv:x64-windows opus:x64-windows
        echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        
    - name: Configure custom settings
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: |
        # Setze Build-Umgebungsvariablen
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        
        # Suche nach Konfigurationsdateien
        Write-Host "🔍 Suche nach Konfigurationsdateien..."
        Get-ChildItem -Recurse -Name "config.rs" | ForEach-Object { Write-Host "Gefunden: $_" }
        
        # Bearbeite Konfigurationsdateien falls gefunden
        $configFiles = @(
          "libs\hbb_common\src\config.rs",
          "src\config.rs",
          "flutter\lib\common.dart"
        )
        
        foreach ($file in $configFiles) {
          if (Test-Path $file) {
            Write-Host "🔧 Bearbeite $file"
            $content = Get-Content $file -Raw
            
            # Server-Konfiguration
            if ($content -match 'RENDEZVOUS_SERVERS') {
              $content = $content -replace 'pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*?\];', "pub const RENDEZVOUS_SERVERS: &[&str] = &[`"${{ secrets.RENDEZVOUS_SERVER }}`"];"
              Write-Host "✅ RENDEZVOUS_SERVER in $file gesetzt"
            }
            
            # Public Key
            if ($content -match 'RS_PUB_KEY|PUBLIC_RS_PUB_KEY') {
              $content = $content -replace 'pub const (RS_PUB_KEY|PUBLIC_RS_PUB_KEY): &str = ".*?";', "pub const `$1: &str = `"${{ secrets.RS_PUB_KEY }}`";"
              Write-Host "✅ RS_PUB_KEY in $file gesetzt"
            }
            
            Set-Content $file $content -NoNewline
          }
        }
      shell: powershell

    - name: Build RustDesk
      run: |
        Write-Host "🚀 Starte RustDesk Build..."
        
        # Versuche Flutter Build zuerst
        if (Test-Path "flutter") {
          Write-Host "📱 Flutter-Verzeichnis gefunden, versuche Flutter Build..."
          
          if (Test-Path "build.py") {
            Write-Host "🐍 Build-Script gefunden, verwende build.py"
            python build.py --flutter --hwcodec
            if ($LASTEXITCODE -ne 0) {
              Write-Host "⚠️ Flutter build fehlgeschlagen, versuche Standard build..."
              python build.py
            }
          } else {
            Write-Host "🦀 Kein build.py gefunden, verwende Cargo direkt"
            cargo build --release --bin rustdesk
          }
        } else {
          Write-Host "🦀 Verwende direkten Cargo Build"
          cargo build --release --bin rustdesk
        }
        
        # Zeige was gebaut wurde
        Write-Host "📦 Gebaute Dateien:"
        if (Test-Path "target\release") {
          Get-ChildItem "target\release" -Name "*.exe" | ForEach-Object { Write-Host "  $_" }
        }
      shell: powershell
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: rustdesk-windows-custom
        path: |
          target/release/*.exe
          target/release/bundle
        if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install Python  
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          curl \
          wget \
          file \
          libssl-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libasound2-dev \
          libxcb-randr0-dev \
          libxdo-dev \
          libxfixes-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libudev-dev \
          libpam0g-dev \
          cmake \
          git \
          gcc \
          g++ \
          libc6-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev

    - name: Configure custom settings
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: |
        # Setze Build-Umgebungsvariablen
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV
        
        # Suche Konfigurationsdateien
        echo "🔍 Suche nach Konfigurationsdateien..."
        find . -name "config.rs" -type f | head -5
        
        # Bearbeite Konfigurationsdateien
        config_files=(
          "libs/hbb_common/src/config.rs"
          "src/config.rs"
        )
        
        for file in "${config_files[@]}"; do
          if [ -f "$file" ]; then
            echo "🔧 Bearbeite $file"
            
            # Backup erstellen
            cp "$file" "$file.backup"
            
            # Server konfigurieren
            if grep -q "RENDEZVOUS_SERVERS" "$file"; then
              sed -i 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' "$file"
              echo "✅ RENDEZVOUS_SERVER in $file gesetzt"
            fi
            
            # Public Key konfigurieren
            if grep -q "RS_PUB_KEY\|PUBLIC_RS_PUB_KEY" "$file"; then
              sed -i 's/pub const \(RS_PUB_KEY\|PUBLIC_RS_PUB_KEY\): &str = ".*";/pub const \1: \&str = "${{ secrets.RS_PUB_KEY }}";/' "$file"
              echo "✅ RS_PUB_KEY in $file gesetzt"
            fi
          fi
        done

    - name: Build RustDesk
      run: |
        echo "🚀 Starte RustDesk Build..."
        
        # Versuche verschiedene Build-Methoden
        if [ -f "build.py" ] && [ -d "flutter" ]; then
          echo "📱 Flutter Build..."
          python3 build.py --flutter || python3 build.py || cargo build --release --bin rustdesk
        elif [ -f "build.py" ]; then
          echo "🐍 Python Build..."
          python3 build.py || cargo build --release --bin rustdesk
        else
          echo "🦀 Cargo Build..."
          cargo build --release --bin rustdesk
        fi
        
        # Zeige gebaute Dateien
        echo "📦 Gebaute Dateien:"
        if [ -d "target/release" ]; then
          ls -la target/release/ | grep -E "(rustdesk|\.deb|\.appimage)"
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: rustdesk-linux-custom
        path: |
          target/release/rustdesk
          target/release/*.deb
          target/release/*.AppImage
        if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Configure custom settings
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: |
        # Setze Build-Umgebungsvariablen
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV
        
        # Suche Konfigurationsdateien
        echo "🔍 Suche nach Konfigurationsdateien..."
        find . -name "config.rs" -type f | head -5
        
        # Bearbeite Konfigurationsdateien
        config_files=(
          "libs/hbb_common/src/config.rs"
          "src/config.rs"
        )
        
        for file in "${config_files[@]}"; do
          if [ -f "$file" ]; then
            echo "🔧 Bearbeite $file"
            
            # Backup erstellen
            cp "$file" "$file.backup"
            
            # Server konfigurieren (macOS sed syntax)
            if grep -q "RENDEZVOUS_SERVERS" "$file"; then
              sed -i '' 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' "$file"
              echo "✅ RENDEZVOUS_SERVER in $file gesetzt"
            fi
            
            # Public Key konfigurieren (macOS sed syntax)
            if grep -q "RS_PUB_KEY\|PUBLIC_RS_PUB_KEY" "$file"; then
              sed -i '' 's/pub const \(RS_PUB_KEY\|PUBLIC_RS_PUB_KEY\): &str = ".*";/pub const \1: \&str = "${{ secrets.RS_PUB_KEY }}";/' "$file"
              echo "✅ RS_PUB_KEY in $file gesetzt"
            fi
          fi
        done

    - name: Build RustDesk
      run: |
        echo "🚀 Starte RustDesk Build..."
        
        # Versuche verschiedene Build-Methoden
        if [ -f "build.py" ] && [ -d "flutter" ]; then
          echo "📱 Flutter Build..."
          python3 build.py --flutter || python3 build.py || cargo build --release --bin rustdesk
        elif [ -f "build.py" ]; then
          echo "🐍 Python Build..."
          python3 build.py || cargo build --release --bin rustdesk
        else
          echo "🦀 Cargo Build..."
          cargo build --release --bin rustdesk
        fi
        
        # Zeige gebaute Dateien
        echo "📦 Gebaute Dateien:"
        if [ -d "target/release" ]; then
          ls -la target/release/ | grep -E "(rustdesk|\.app|\.dmg)"
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: rustdesk-macos-custom
        path: |
          target/release/rustdesk
          target/release/*.app
          target/release/*.dmg
        if-no-files-found: warn
