name: Build Custom RustDesk Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_VERSION: "1.75.0"

jobs:
  build-linux:
    name: Build RustDesk Linux
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ env.RUST_VERSION }}

    - name: Install system dependencies
      run: |
        echo "Installing RustDesk dependencies..."
        sudo apt-get update
        sudo apt-get install -y \
          curl \
          wget \
          git \
          nasm \
          yasm \
          libgtk-3-dev \
          libxcb-randr0-dev \
          libxdo-dev \
          libxfixes-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libasound2-dev \
          libpulse-dev \
          cmake \
          make \
          libclang-dev \
          ninja-build \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libpam0g-dev \
          zip \
          g++ \
          gcc \
          libc6-dev \
          pkg-config \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libudev-dev

    - name: Install vcpkg and dependencies
      run: |
        echo "Setting up vcpkg..."
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        git checkout 2023.04.15
        ./bootstrap-vcpkg.sh
        export VCPKG_ROOT=$PWD
        echo "VCPKG_ROOT=$PWD" >> $GITHUB_ENV
        
        echo "Installing vcpkg packages..."
        ./vcpkg install libvpx libyuv opus aom
        
        # Fix for libvpx if needed
        cd buildtrees/libvpx/src
        if [ -d "*" ]; then
          cd *
          if [ -f "Makefile" ] && [ -f "configure" ]; then
            ./configure || true
            sed -i 's/CFLAGS+=-I/CFLAGS+=-fPIC -I/g' Makefile || true
            sed -i 's/CXXFLAGS+=-I/CXXFLAGS+=-fPIC -I/g' Makefile || true
            make || true
            cp libvpx.a $VCPKG_ROOT/installed/x64-linux/lib/ || true
          fi
        fi

    - name: Configure custom RustDesk settings
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: |
        echo "Configuring custom RustDesk settings..."
        
        # Check secrets
        if [ -z "$RENDEZVOUS_SERVER" ]; then
          echo "WARNING: RENDEZVOUS_SERVER secret not set - using default"
        else
          echo "SUCCESS: RENDEZVOUS_SERVER configured: $RENDEZVOUS_SERVER"
        fi
        
        if [ -z "$RS_PUB_KEY" ]; then
          echo "WARNING: RS_PUB_KEY secret not set - using default"
        else
          echo "SUCCESS: RS_PUB_KEY configured: ${RS_PUB_KEY:0:20}..."
        fi
        
        # Set build environment variables
        echo "RENDEZVOUS_SERVER=$RENDEZVOUS_SERVER" >> $GITHUB_ENV
        echo "RS_PUB_KEY=$RS_PUB_KEY" >> $GITHUB_ENV
        
        # Find and modify config files
        echo "Searching for config files..."
        find . -name "config.rs" -type f | while read file; do
          echo "Found config file: $file"
          
          if grep -q "RENDEZVOUS_SERVERS\|RS_PUB_KEY\|PUBLIC_RS_PUB_KEY" "$file"; then
            echo "  Modifying $file..."
            
            # Create backup
            cp "$file" "$file.backup"
            
            # Configure server (only if secret is set and pattern exists)
            if [ -n "$RENDEZVOUS_SERVER" ] && grep -q "RENDEZVOUS_SERVERS" "$file"; then
              sed -i "s|pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];|pub const RENDEZVOUS_SERVERS: \&[\&str] = \&[\"$RENDEZVOUS_SERVER\"];|" "$file"
              echo "    Server configured to: $RENDEZVOUS_SERVER"
            fi
            
            # Configure public key (only if secret is set and pattern exists)
            if [ -n "$RS_PUB_KEY" ] && grep -q "RS_PUB_KEY\|PUBLIC_RS_PUB_KEY" "$file"; then
              sed -i "s|pub const \(RS_PUB_KEY\|PUBLIC_RS_PUB_KEY\): &str = \".*\";|pub const \1: \&str = \"$RS_PUB_KEY\";|" "$file"
              echo "    Public key configured"
            fi
            
            # Show changes
            echo "    Modified lines:"
            grep -n "RENDEZVOUS_SERVERS\|RS_PUB_KEY\|PUBLIC_RS_PUB_KEY" "$file" | head -3 | sed 's/^/      /'
          else
            echo "  No relevant constants found"
          fi
        done

    - name: Build RustDesk with inline features
      run: |
        echo "Starting RustDesk build with inline features..."
        echo "Build environment:"
        echo "  Rust: $(rustc --version)"
        echo "  Cargo: $(cargo --version)"
        echo "  VCPKG_ROOT: $VCPKG_ROOT"
        
        # Use inline build like in original RustDesk workflow
        echo "Running inline sciter patch..."
        if [ -f "res/inline-sciter.py" ]; then
          python3 res/inline-sciter.py
        fi
        
        # Build with inline features for standalone binary
        echo "Building with inline and hardware codec features..."
        if VCPKG_ROOT=$VCPKG_ROOT cargo build --features inline,vram,hwcodec --release --bins --verbose 2>&1 | tee build.log; then
          echo "BUILD SUCCESSFUL!"
          
          echo "Built binaries:"
          if [ -d "target/release" ]; then
            find target/release -type f -executable 2>/dev/null | while read file; do
              if [ -f "$file" ]; then
                size=$(du -h "$file" | cut -f1)
                echo "  $file ($size)"
              fi
            done
          fi
          
          # Check specifically for rustdesk binary
          if [ -f "target/release/rustdesk" ]; then
            echo "RustDesk binary successfully created!"
            ls -la target/release/rustdesk
            file target/release/rustdesk
          fi
        else
          echo "BUILD FAILED"
          echo "Last error messages:"
          tail -30 build.log
          
          echo "Trying fallback build without features..."
          if cargo build --release --verbose 2>&1 | tee build_fallback.log; then
            echo "Fallback build successful!"
          else
            echo "Fallback build also failed:"
            tail -20 build_fallback.log
            exit 1
          fi
        fi

    - name: Create release package
      run: |
        echo "Creating release package..."
        
        if [ -f "target/release/rustdesk" ]; then
          mkdir -p rustdesk-linux-release
          cp target/release/rustdesk rustdesk-linux-release/
          chmod +x rustdesk-linux-release/rustdesk
          
          # Create simple info file
          echo "RustDesk Custom Build" > rustdesk-linux-release/BUILD_INFO.txt
          echo "=====================" >> rustdesk-linux-release/BUILD_INFO.txt
          echo "Built on: $(date)" >> rustdesk-linux-release/BUILD_INFO.txt
          echo "Git commit: ${GITHUB_SHA:0:8}" >> rustdesk-linux-release/BUILD_INFO.txt
          echo "Build environment: Ubuntu 22.04" >> rustdesk-linux-release/BUILD_INFO.txt
          echo "Rust version: $(rustc --version)" >> rustdesk-linux-release/BUILD_INFO.txt
          echo "Build features: inline,vram,hwcodec" >> rustdesk-linux-release/BUILD_INFO.txt
          echo "" >> rustdesk-linux-release/BUILD_INFO.txt
          echo "Custom Configuration:" >> rustdesk-linux-release/BUILD_INFO.txt
          if [ -n "$RENDEZVOUS_SERVER" ]; then
            echo "- RENDEZVOUS_SERVER: $RENDEZVOUS_SERVER" >> rustdesk-linux-release/BUILD_INFO.txt
          else
            echo "- RENDEZVOUS_SERVER: default (rs-ny.rustdesk.com)" >> rustdesk-linux-release/BUILD_INFO.txt
          fi
          if [ -n "$RS_PUB_KEY" ]; then
            echo "- RS_PUB_KEY: configured" >> rustdesk-linux-release/BUILD_INFO.txt
          else
            echo "- RS_PUB_KEY: default" >> rustdesk-linux-release/BUILD_INFO.txt
          fi
          echo "" >> rustdesk-linux-release/BUILD_INFO.txt
          echo "Usage:" >> rustdesk-linux-release/BUILD_INFO.txt
          echo "  chmod +x rustdesk" >> rustdesk-linux-release/BUILD_INFO.txt
          echo "  ./rustdesk" >> rustdesk-linux-release/BUILD_INFO.txt
          
          echo "Release package created:"
          ls -la rustdesk-linux-release/
        else
          echo "No rustdesk binary found"
          echo "Available files in target/release:"
          ls -la target/release/ || echo "target/release directory not found"
          exit 1
        fi

    - name: Upload RustDesk Linux Binary
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-linux-custom
        path: rustdesk-linux-release/
        if-no-files-found: error

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: linux-build-logs
        path: |
          build.log
          build_fallback.log
          **/*.backup
        if-no-files-found: ignore

  build-windows:
    name: Build RustDesk Windows
    runs-on: windows-2022
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ env.RUST_VERSION }}

    - name: Install LLVM
      uses: KyleMayes/install-llvm-action@v1
      with:
        version: "15.0.6"

    - name: Install vcpkg and dependencies
      shell: powershell
      run: |
        Write-Host "Setting up vcpkg for Windows..."
        git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
        cd C:\vcpkg
        git checkout 2023.04.15
        .\bootstrap-vcpkg.bat
        
        Write-Host "Installing vcpkg packages..."
        .\vcpkg.exe install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
        
        echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Configure custom RustDesk settings
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      shell: powershell
      run: |
        Write-Host "Configuring custom RustDesk settings..."
        
        # Check secrets
        $serverSet = ![string]::IsNullOrEmpty($env:RENDEZVOUS_SERVER)
        $keySet = ![string]::IsNullOrEmpty($env:RS_PUB_KEY)
        
        if (!$serverSet) {
          Write-Host "WARNING: RENDEZVOUS_SERVER secret not set - using default"
        } else {
          Write-Host "SUCCESS: RENDEZVOUS_SERVER configured: $env:RENDEZVOUS_SERVER"
        }
        
        if (!$keySet) {
          Write-Host "WARNING: RS_PUB_KEY secret not set - using default"
        } else {
          Write-Host "SUCCESS: RS_PUB_KEY configured: $($env:RS_PUB_KEY.Substring(0, [Math]::Min(20, $env:RS_PUB_KEY.Length)))..."
        }
        
        # Set build environment variables
        Add-Content $env:GITHUB_ENV "RENDEZVOUS_SERVER=$env:RENDEZVOUS_SERVER"
        Add-Content $env:GITHUB_ENV "RS_PUB_KEY=$env:RS_PUB_KEY"
        
        # Find and modify config files
        Write-Host "Searching for config files..."
        Get-ChildItem -Recurse -Include "config.rs" | ForEach-Object {
          $file = $_.FullName
          Write-Host "Found config file: $file"
          
          $content = Get-Content $file -Raw -ErrorAction SilentlyContinue
          if ($content -and ($content -match 'RENDEZVOUS_SERVERS|RS_PUB_KEY|PUBLIC_RS_PUB_KEY')) {
            Write-Host "  Modifying $file..."
            
            # Create backup
            Copy-Item $file "$file.backup" -ErrorAction SilentlyContinue
            
            # Configure server
            if ($serverSet -and $content -match 'RENDEZVOUS_SERVERS') {
              $content = $content -replace 'pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*?\];', "pub const RENDEZVOUS_SERVERS: &[&str] = &[`"$env:RENDEZVOUS_SERVER`"];"
              Write-Host "    Server configured to: $env:RENDEZVOUS_SERVER"
            }
            
            # Configure public key
            if ($keySet -and $content -match 'RS_PUB_KEY|PUBLIC_RS_PUB_KEY') {
              $content = $content -replace 'pub const (RS_PUB_KEY|PUBLIC_RS_PUB_KEY): &str = ".*?";', "pub const `$1: &str = `"$env:RS_PUB_KEY`";"
              Write-Host "    Public key configured"
            }
            
            # Write back
            Set-Content $file $content -NoNewline -ErrorAction SilentlyContinue
            
            # Show changes
            Write-Host "    Modified lines:"
            Select-String -Path $file -Pattern "RENDEZVOUS_SERVERS|RS_PUB_KEY|PUBLIC_RS_PUB_KEY" | Select-Object -First 3 | ForEach-Object { Write-Host "      $($_.Line)" }
          } else {
            Write-Host "  No relevant constants found"
          }
        }

    - name: Build RustDesk with inline features
      shell: powershell
      run: |
        Write-Host "Starting RustDesk build with inline features..."
        Write-Host "Build environment:"
        Write-Host "  Rust: $(rustc --version)"
        Write-Host "  Cargo: $(cargo --version)"
        Write-Host "  VCPKG_ROOT: $env:VCPKG_ROOT"
        
        # Use inline build like in original RustDesk workflow
        Write-Host "Running inline sciter patch..."
        if (Test-Path "res\inline-sciter.py") {
          python res\inline-sciter.py
        }
        
        # Set vcpkg environment
        $env:VCPKG_ROOT = "C:\vcpkg"
        
        # Build with inline features for standalone binary
        Write-Host "Building with inline and hardware codec features..."
        
        $buildSuccess = $false
        try {
          cargo build --features inline,vram,hwcodec --release --bins --verbose 2>&1 | Tee-Object -FilePath "build.log"
          $buildSuccess = $LASTEXITCODE -eq 0
          
          if ($buildSuccess) {
            Write-Host "BUILD SUCCESSFUL!"
          } else {
            Write-Host "Primary build failed with exit code: $LASTEXITCODE"
          }
        } catch {
          Write-Host "Primary build exception: $($_.Exception.Message)"
        }
        
        if (-not $buildSuccess) {
          Write-Host "Trying fallback build without features..."
          try {
            cargo build --release --verbose 2>&1 | Tee-Object -FilePath "build_fallback.log"
            $buildSuccess = $LASTEXITCODE -eq 0
            
            if ($buildSuccess) {
              Write-Host "Fallback build successful!"
            } else {
              Write-Host "Fallback build also failed with exit code: $LASTEXITCODE"
            }
          } catch {
            Write-Host "Fallback build exception: $($_.Exception.Message)"
          }
        }
        
        if (-not $buildSuccess) {
          Write-Host "All builds failed. Showing available logs:"
          if (Test-Path "build.log") {
            Write-Host "Primary build errors:"
            Get-Content "build.log" | Select-Object -Last 30
          }
          if (Test-Path "build_fallback.log") {
            Write-Host "Fallback build errors:"
            Get-Content "build_fallback.log" | Select-Object -Last 20
          }
          exit 1
        }
        
        Write-Host "Built binaries:"
        if (Test-Path "target\release") {
          Get-ChildItem "target\release" -Include "*.exe" | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 1)
            Write-Host "  $($_.FullName) ($size MB)"
          }
        }
        
        # Check specifically for rustdesk.exe
        if (Test-Path "target\release\rustdesk.exe") {
          Write-Host "RustDesk.exe successfully created!"
          Get-Item "target\release\rustdesk.exe"
        }

    - name: Create release package
      shell: powershell
      run: |
        Write-Host "Creating release package..."
        
        # Search for rustdesk executables
        $rustdeskExecutables = Get-ChildItem "target\release" -Include "rustdesk*" -File
        
        if ($rustdeskExecutables.Count -gt 0) {
          New-Item -ItemType Directory -Path "rustdesk-windows-release" -Force
          
          $rustdeskExecutables | ForEach-Object {
            Copy-Item $_.FullName "rustdesk-windows-release\"
            Write-Host "Copied: $($_.Name)"
          }
          
          # Create info file line by line
          $infoFile = "rustdesk-windows-release\BUILD_INFO.txt"
          "RustDesk Custom Build" | Out-File -FilePath $infoFile -Encoding UTF8
          "=====================" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          "Built on: $(Get-Date)" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          "Git commit: $($env:GITHUB_SHA.Substring(0,8))" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          "Build environment: Windows 2022" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          "Rust version: $(rustc --version)" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          "Build features: inline,vram,hwcodec" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          "" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          "Custom Configuration:" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          
          if ($env:RENDEZVOUS_SERVER) {
            "- RENDEZVOUS_SERVER: $env:RENDEZVOUS_SERVER" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          } else {
            "- RENDEZVOUS_SERVER: default (rs-ny.rustdesk.com)" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          }
          
          if ($env:RS_PUB_KEY) {
            "- RS_PUB_KEY: configured" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          } else {
            "- RS_PUB_KEY: default" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          }
          
          "" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          "Usage:" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          "  Double-click rustdesk.exe to run" | Out-File -FilePath $infoFile -Append -Encoding UTF8
          
          Write-Host "Release package created:"
          Get-ChildItem "rustdesk-windows-release"
        } else {
          Write-Host "No rustdesk executables found"
          Write-Host "Available files in target\release:"
          Get-ChildItem "target\release" -ErrorAction SilentlyContinue
          exit 1
        }

    - name: Upload RustDesk Windows Binary
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-custom
        path: rustdesk-windows-release/
        if-no-files-found: error

    - name: Upload build logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: windows-build-logs
        path: |
          build.log
          build_fallback.log
          **/*.backup
        if-no-files-found: ignore
