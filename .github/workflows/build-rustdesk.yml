name: Build Custom RustDesk Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        override: true
        components: rustfmt, clippy
        
    - name: Install dependencies
      run: |
        # Windows-spezifische Dependencies
        choco install llvm
        # vcpkg für zusätzliche Libraries
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg install libvpx:x64-windows libyuv:x64-windows opus:x64-windows
        echo "VCPKG_ROOT=$PWD" >> $GITHUB_ENV
        cd ..
        
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Configure custom settings
      run: |
        # Setze die korrekten Umgebungsvariablen für RustDesk
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV
        
        # Debug: Zeige verfügbare Dateien
        echo "📁 Verfügbare Rust-Dateien:"
        find . -name "*.rs" -path "*/config*" -o -name "config.rs" | head -10
        
        # Zusätzlich: Modifiziere Konfigurationsdateien direkt
        # RustDesk sucht nach diesen Dateien für hardcoded Werte
        $configFiles = @("libs/hbb_common/src/config.rs", "src/config.rs", "src/common.rs")
        
        foreach ($configFile in $configFiles) {
          if (Test-Path $configFile) {
            Write-Host "🔧 Bearbeite $configFile..."
            
            # Backup erstellen
            Copy-Item $configFile "$configFile.backup"
            
            # Rendezvous Server konfigurieren
            (Get-Content $configFile) -replace 'pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*?\];', "pub const RENDEZVOUS_SERVERS: &[&str] = &[`"${{ secrets.RENDEZVOUS_SERVER }}`"];" | Set-Content $configFile
            
            # Public Key konfigurieren (verschiedene mögliche Variablennamen)
            (Get-Content $configFile) -replace 'pub const PUBLIC_RS_PUB_KEY: &str = ".*?";', "pub const PUBLIC_RS_PUB_KEY: &str = `"${{ secrets.RS_PUB_KEY }}`";" | Set-Content $configFile
            (Get-Content $configFile) -replace 'pub const RS_PUB_KEY: &str = ".*?";', "pub const RS_PUB_KEY: &str = `"${{ secrets.RS_PUB_KEY }}`";" | Set-Content $configFile
            
            Write-Host "✅ $configFile konfiguriert"
          } else {
            Write-Host "⚠️  $configFile nicht gefunden"
          }
        }
      shell: powershell

    - name: Build RustDesk
      run: |
        # Flutter Build (da RustDesk hauptsächlich Flutter verwendet)
        python3 -c "
import subprocess
import sys
import os

# Prüfe ob Flutter verfügbar ist, sonst normaler Rust build
try:
    # Teste ob Flutter build verfügbar ist
    if os.path.exists('flutter'):
        print('🔥 Building with Flutter...')
        result = subprocess.run(['python3', 'build.py', '--flutter'], capture_output=True, text=True, timeout=1800)
        if result.returncode != 0:
            print('Flutter build failed, falling back to cargo build')
            subprocess.run(['cargo', 'build', '--release'], check=True)
    else:
        print('🦀 Building with Cargo...')
        subprocess.run(['cargo', 'build', '--release'], check=True)
except Exception as e:
    print(f'Build script failed: {e}')
    print('🦀 Fallback: Using cargo build --release')
    subprocess.run(['cargo', 'build', '--release'], check=True)
"
        
    - name: Build installer (Windows)
      run: |
        # Installer bauen falls verfügbar
        if (Test-Path "build.py") {
          python build.py --portable
        }
      shell: powershell
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-windows-custom
        path: |
          target/release/rustdesk.exe
          target/release/*.exe

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          curl \
          wget \
          file \
          libssl-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libasound2-dev \
          libxcb-randr0-dev \
          libxdo-dev \
          libxfixes-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libudev-dev \
          libpam0g-dev \
          cmake \
          git
          
    - name: Configure custom settings
      run: |
        # Debug: Zeige Projektstruktur
        echo "📁 Projektstruktur:"
        find . -maxdepth 3 -name "*.rs" -path "*/config*" -o -name "config.rs" | head -10
        
        # Konfiguration für Linux
        if [ -f "libs/hbb_common/src/config.rs" ]; then
          echo "🔧 Bearbeite libs/hbb_common/src/config.rs..."
          cp libs/hbb_common/src/config.rs libs/hbb_common/src/config.rs.backup
          sed -i 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' libs/hbb_common/src/config.rs
          sed -i 's/pub const PUBLIC_RS_PUB_KEY: &str = ".*";/pub const PUBLIC_RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' libs/hbb_common/src/config.rs
          sed -i 's/pub const RS_PUB_KEY: &str = ".*";/pub const RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' libs/hbb_common/src/config.rs
          echo "✅ libs/hbb_common/src/config.rs konfiguriert"
        else
          echo "⚠️  libs/hbb_common/src/config.rs nicht gefunden"
        fi
        
        if [ -f "src/config.rs" ]; then
          echo "🔧 Bearbeite src/config.rs..."
          cp src/config.rs src/config.rs.backup
          sed -i 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' src/config.rs
          sed -i 's/pub const PUBLIC_RS_PUB_KEY: &str = ".*";/pub const PUBLIC_RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' src/config.rs
          sed -i 's/pub const RS_PUB_KEY: &str = ".*";/pub const RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' src/config.rs
          echo "✅ src/config.rs konfiguriert"
        else
          echo "⚠️  src/config.rs nicht gefunden"
        fi
        
        # Umgebungsvariablen setzen (wichtig für Build-Process)
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV
        
    - name: Build RustDesk
      run: |
        # Intelligenter Build-Process
        echo "🔍 Prüfe verfügbare Build-Optionen..."
        
        if [ -f "build.py" ]; then
          echo "🐍 Python Build-Script gefunden"
          if [ -d "flutter" ]; then
            echo "🔥 Flutter Build wird gestartet..."
            python3 build.py --flutter || python3 build.py || cargo build --release
          else
            echo "🦀 Standard Build wird gestartet..."
            python3 build.py || cargo build --release
          fi
        else
          echo "🦀 Cargo Build wird gestartet..."
          cargo build --release
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-linux-custom
        path: |
          target/release/rustdesk

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
        
    - name: Configure custom settings
      run: |
        # Debug: Zeige Projektstruktur
        echo "📁 Projektstruktur:"
        find . -maxdepth 3 -name "*.rs" -path "*/config*" -o -name "config.rs" | head -10
        
        # Konfiguration für macOS
        if [ -f "libs/hbb_common/src/config.rs" ]; then
          echo "🔧 Bearbeite libs/hbb_common/src/config.rs..."
          cp libs/hbb_common/src/config.rs libs/hbb_common/src/config.rs.backup
          sed -i '' 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' libs/hbb_common/src/config.rs
          sed -i '' 's/pub const PUBLIC_RS_PUB_KEY: &str = ".*";/pub const PUBLIC_RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' libs/hbb_common/src/config.rs
          sed -i '' 's/pub const RS_PUB_KEY: &str = ".*";/pub const RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' libs/hbb_common/src/config.rs
          echo "✅ libs/hbb_common/src/config.rs konfiguriert"
        else
          echo "⚠️  libs/hbb_common/src/config.rs nicht gefunden"
        fi
        
        if [ -f "src/config.rs" ]; then
          echo "🔧 Bearbeite src/config.rs..."
          cp src/config.rs src/config.rs.backup
          sed -i '' 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' src/config.rs
          sed -i '' 's/pub const PUBLIC_RS_PUB_KEY: &str = ".*";/pub const PUBLIC_RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' src/config.rs
          sed -i '' 's/pub const RS_PUB_KEY: &str = ".*";/pub const RS_PUB_KEY: \&str = "${{ secrets.RS_PUB_KEY }}";/' src/config.rs
          echo "✅ src/config.rs konfiguriert"
        else
          echo "⚠️  src/config.rs nicht gefunden"
        fi
        
        # Umgebungsvariablen setzen (wichtig für Build-Process)
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV
        
    - name: Build RustDesk
      run: |
        # Intelligenter Build-Process für macOS
        echo "🔍 Prüfe verfügbare Build-Optionen..."
        
        if [ -f "build.py" ]; then
          echo "🐍 Python Build-Script gefunden"
          if [ -d "flutter" ]; then
            echo "🔥 Flutter Build wird gestartet..."
            python3 build.py --flutter || python3 build.py || cargo build --release
          else
            echo "🦀 Standard Build wird gestartet..."
            python3 build.py || cargo build --release
          fi
        else
          echo "🦀 Cargo Build wird gestartet..."
          cargo build --release
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-macos-custom
        path: |
          target/release/rustdesk
