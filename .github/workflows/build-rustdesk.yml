name: Build Custom RustDesk Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  SCITER_RUST_VERSION: "1.75"
  RUST_VERSION: "1.75" 
  MAC_RUST_VERSION: "1.81"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "485b23ac13e8c0b3004d6bb73fc3ead5e5fc5d22"

jobs:
  # Einfacher Test-Build nur für Windows erstmal
  build-windows-simple:
    name: Windows Simple Build
    runs-on: windows-2022
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.75.0"
        components: rustfmt, clippy

    - name: Install LLVM and Clang
      uses: KyleMayes/install-llvm-action@v1
      with:
        version: ${{ env.LLVM_VERSION }}

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: Setup vcpkg
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        cd vcpkg
        git checkout ${{ env.VCPKG_COMMIT_ID }}
        .\bootstrap-vcpkg.bat
        echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      shell: powershell

    - name: Install vcpkg dependencies  
      run: |
        $env:VCPKG_ROOT = "${{ github.workspace }}\vcpkg"
        & $env:VCPKG_ROOT\vcpkg.exe install --triplet x64-windows-static --x-install-root="$env:VCPKG_ROOT\installed"
      shell: powershell

    - name: Configure custom settings
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: |
        # Debug: Zeige verfügbare Dateien
        Write-Host "🔍 Projektstruktur:"
        Get-ChildItem -Recurse -Include "config.rs" | Select-Object FullName
        
        # Umgebungsvariablen für Build setzen
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        
        # Konfigurationsdateien modifizieren
        $configFiles = @(
          "libs\hbb_common\src\config.rs",
          "src\config.rs"
        )
        
        foreach ($file in $configFiles) {
          if (Test-Path $file) {
            Write-Host "🔧 Bearbeite $file"
            $content = Get-Content $file -Raw -ErrorAction SilentlyContinue
            
            if ($content) {
              # Backup erstellen
              Copy-Item $file "$file.backup" -ErrorAction SilentlyContinue
              
              # Server konfigurieren (nur wenn Pattern gefunden wird)
              if ($content -match 'RENDEZVOUS_SERVERS') {
                $content = $content -replace 'pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*?\];', "pub const RENDEZVOUS_SERVERS: &[&str] = &[`"${{ secrets.RENDEZVOUS_SERVER }}`"];"
                Write-Host "✅ RENDEZVOUS_SERVER gesetzt in $file"
              }
              
              # Public Key (nur wenn Pattern gefunden wird)
              if ($content -match 'RS_PUB_KEY|PUBLIC_RS_PUB_KEY') {
                $content = $content -replace 'pub const (RS_PUB_KEY|PUBLIC_RS_PUB_KEY): &str = ".*?";', "pub const `$1: &str = `"${{ secrets.RS_PUB_KEY }}`";"
                Write-Host "✅ RS_PUB_KEY gesetzt in $file"
              }
              
              # Schreibe zurück
              Set-Content $file $content -NoNewline -ErrorAction SilentlyContinue
            }
          } else {
            Write-Host "⚠️ $file nicht gefunden"
          }
        }
      shell: powershell

    - name: Replace engine with rustdesk custom flutter engine
      run: |
        flutter doctor -v
        flutter precache --windows
        Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
        Expand-Archive windows-x64-release.zip -DestinationPath engine
        Move-Item "engine/*" "C:\hostedtoolcache\windows\flutter\stable-${{ env.FLUTTER_VERSION }}-x64\bin\cache\artifacts\engine\windows-x64-release\" -Force
      shell: powershell

    - name: Build rustdesk
      run: |
        Write-Host "🚀 Starte RustDesk Build..."
        
        # Verwende das offizielle Build-Script
        python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
        
        Write-Host "📦 Build abgeschlossen. Prüfe Ausgabe..."
        if (Test-Path "flutter\build\windows\x64\runner\Release") {
          Write-Host "✅ Flutter Release Build gefunden!"
          Move-Item "flutter\build\windows\x64\runner\Release" "rustdesk-release"
          Get-ChildItem "rustdesk-release" | ForEach-Object { Write-Host "  - $($_.Name)" }
        } else {
          Write-Host "❌ Flutter Release Build nicht gefunden"
          Write-Host "Verfügbare Dateien im flutter/build Verzeichnis:"
          if (Test-Path "flutter\build") {
            Get-ChildItem -Recurse "flutter\build" | Where-Object { $_.Name -like "*.exe" } | ForEach-Object { Write-Host "  - $($_.FullName)" }
          }
        }
        
        # Fallback: Prüfe target/release
        if (Test-Path "target\release") {
          Write-Host "Dateien in target/release:"
          Get-ChildItem "target\release" | ForEach-Object { Write-Host "  - $($_.Name)" }
        }
      shell: powershell

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: rustdesk-windows-custom
        path: |
          rustdesk-release/
          target/release/*.exe
        if-no-files-found: warn

  # Linux Build (vereinfacht)
  build-linux-simple:
    name: Linux Simple Build
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.75.0"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          curl \
          wget \
          git \
          nasm \
          yasm \
          libgtk-3-dev \
          libxcb-randr0-dev \
          libxdo-dev \
          libxfixes-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libasound2-dev \
          libpulse-dev \
          cmake \
          make \
          libclang-dev \
          ninja-build \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libpam0g-dev \
          libayatana-appindicator3-dev \
          zip \
          g++ \
          gcc \
          libc6-dev

    - name: Install Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: "stable"
        flutter-version: ${{ env.FLUTTER_VERSION }}

    - name: Configure custom settings
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: |
        # Debug: Zeige verfügbare Dateien  
        echo "🔍 Projektstruktur:"
        find . -name "config.rs" -type f | head -5
        
        # Umgebungsvariablen für Build setzen
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV
        
        # Konfigurationsdateien modifizieren
        config_files=(
          "libs/hbb_common/src/config.rs"
          "src/config.rs"
        )
        
        for file in "${config_files[@]}"; do
          if [ -f "$file" ]; then
            echo "🔧 Bearbeite $file"
            
            # Backup erstellen
            cp "$file" "$file.backup"
            
            # Server konfigurieren (nur wenn Pattern vorhanden)
            if grep -q "RENDEZVOUS_SERVERS" "$file"; then
              sed -i 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' "$file"
              echo "✅ RENDEZVOUS_SERVER gesetzt in $file"
            fi
            
            # Public Key konfigurieren (nur wenn Pattern vorhanden)
            if grep -q "RS_PUB_KEY\|PUBLIC_RS_PUB_KEY" "$file"; then
              sed -i 's/pub const \(RS_PUB_KEY\|PUBLIC_RS_PUB_KEY\): &str = ".*";/pub const \1: \&str = "${{ secrets.RS_PUB_KEY }}";/' "$file"
              echo "✅ RS_PUB_KEY gesetzt in $file"
            fi
          else
            echo "⚠️ $file nicht gefunden"
          fi
        done

    - name: Build rustdesk
      run: |
        echo "🚀 Starte RustDesk Build..."
        
        # Verwende das offizielle Build-Script
        if [ -f "build.py" ]; then
          echo "🐍 Verwende build.py"
          python3 build.py --flutter
        else
          echo "🦀 Verwende direkten Cargo Build"
          cargo build --release --features inline,vram,hwcodec --bins
        fi
        
        echo "📦 Build abgeschlossen. Prüfe Ausgabe..."
        
        # Prüfe verschiedene Output-Verzeichnisse
        for dir in "flutter/build/linux/x64/release/bundle" "target/release"; do
          if [ -d "$dir" ]; then
            echo "✅ Gefunden: $dir"
            find "$dir" -name "rustdesk*" -type f | head -5
          fi
        done

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: rustdesk-linux-custom
        path: |
          flutter/build/linux/x64/release/bundle/
          target/release/rustdesk
        if-no-files-found: warn
