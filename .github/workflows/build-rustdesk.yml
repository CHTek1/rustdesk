name: Build Custom RustDesk Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Minimaler Windows Build - nur Rust ohne Flutter
  build-windows-minimal:
    name: Windows Minimal Build
    runs-on: windows-latest
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.75.0"
        components: rustfmt, clippy

    - name: Debug - Show project structure
      run: |
        Write-Host "🔍 Projektstruktur:"
        Get-ChildItem -Recurse -Include "Cargo.toml" | Select-Object FullName
        Write-Host ""
        Write-Host "🔍 Config-Dateien:"
        Get-ChildItem -Recurse -Include "config.rs" | Select-Object FullName
        Write-Host ""
        Write-Host "🔍 Main src-Dateien:"
        Get-ChildItem -Path "src" -Include "*.rs" | Select-Object Name
      shell: powershell

    - name: Configure custom settings
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: |
        # Prüfe ob Secrets gesetzt sind
        if ("${{ secrets.RENDEZVOUS_SERVER }}" -eq "") {
          Write-Host "⚠️ RENDEZVOUS_SERVER Secret nicht gesetzt!"
        } else {
          Write-Host "✅ RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}"
        }
        
        if ("${{ secrets.RS_PUB_KEY }}" -eq "") {
          Write-Host "⚠️ RS_PUB_KEY Secret nicht gesetzt!"
        } else {
          Write-Host "✅ RS_PUB_KEY: $(${{ secrets.RS_PUB_KEY }}.Substring(0, [Math]::Min(20, ${{ secrets.RS_PUB_KEY }}.Length)))..."
        }
        
        # Umgebungsvariablen für Build setzen
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        
        # Suche und bearbeite Konfigurationsdateien
        $configFiles = @()
        Get-ChildItem -Recurse -Include "config.rs" | ForEach-Object {
          $configFiles += $_.FullName
          Write-Host "📁 Gefundene config.rs: $($_.FullName)"
        }
        
        foreach ($file in $configFiles) {
          if (Test-Path $file) {
            Write-Host "🔧 Analysiere $file"
            $content = Get-Content $file -Raw -ErrorAction SilentlyContinue
            
            if ($content) {
              # Prüfe auf relevante Konstanten
              if ($content -match 'RENDEZVOUS_SERVERS') {
                Write-Host "  📡 RENDEZVOUS_SERVERS Pattern gefunden"
              }
              if ($content -match 'RS_PUB_KEY|PUBLIC_RS_PUB_KEY') {
                Write-Host "  🔑 PUB_KEY Pattern gefunden"
              }
              
              # Backup erstellen
              Copy-Item $file "$file.backup" -ErrorAction SilentlyContinue
              
              # Server konfigurieren
              if ($content -match 'RENDEZVOUS_SERVERS' -and "${{ secrets.RENDEZVOUS_SERVER }}" -ne "") {
                $content = $content -replace 'pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*?\];', "pub const RENDEZVOUS_SERVERS: &[&str] = &[`"${{ secrets.RENDEZVOUS_SERVER }}`"];"
                Write-Host "  ✅ RENDEZVOUS_SERVER konfiguriert"
              }
              
              # Public Key konfigurieren
              if ($content -match 'RS_PUB_KEY|PUBLIC_RS_PUB_KEY' -and "${{ secrets.RS_PUB_KEY }}" -ne "") {
                $content = $content -replace 'pub const (RS_PUB_KEY|PUBLIC_RS_PUB_KEY): &str = ".*?";', "pub const `$1: &str = `"${{ secrets.RS_PUB_KEY }}`";"
                Write-Host "  ✅ RS_PUB_KEY konfiguriert"
              }
              
              # Schreibe zurück
              Set-Content $file $content -NoNewline -ErrorAction SilentlyContinue
            }
          }
        }
      shell: powershell

    - name: Try simple cargo build
      run: |
        Write-Host "🚀 Versuche einfachen Cargo Build..."
        
        # Prüfe verfügbare Binaries
        if (Test-Path "Cargo.toml") {
          Write-Host "📋 Verfügbare Binaries in Cargo.toml:"
          Select-String -Path "Cargo.toml" -Pattern "\[\[bin\]\]" -Context 0,3
        }
        
        # Einfacher Build-Versuch
        try {
          Write-Host "🦀 Starte: cargo build --release"
          cargo build --release
          Write-Host "✅ Cargo build erfolgreich!"
        } catch {
          Write-Host "❌ Cargo build fehlgeschlagen: $($_.Exception.Message)"
        }
        
        # Prüfe was gebaut wurde
        Write-Host "`n📦 Gebaute Dateien:"
        if (Test-Path "target\release") {
          Get-ChildItem "target\release" -Include "*.exe" -Recurse | ForEach-Object { 
            Write-Host "  ✅ $($_.FullName) ($(($_.Length / 1MB).ToString('F1')) MB)"
          }
        } else {
          Write-Host "  ❌ target\release Verzeichnis nicht gefunden"
        }
        
        # Prüfe andere mögliche Ausgabeverzeichnisse
        @("target\debug", "out", "build") | ForEach-Object {
          if (Test-Path $_) {
            Write-Host "`n📁 Inhalt von $_:"
            Get-ChildItem $_ -Include "*.exe" -Recurse | Select-Object -First 5 | ForEach-Object { 
              Write-Host "  - $($_.Name)"
            }
          }
        }
      shell: powershell

    - name: Upload any found executables
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: rustdesk-windows-any-executables
        path: |
          target/release/*.exe
          target/debug/*.exe
          **/*.exe
        if-no-files-found: warn

  # Minimaler Linux Build - nur Rust ohne Flutter  
  build-linux-minimal:
    name: Linux Minimal Build
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: "1.75.0"

    - name: Install basic dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libssl-dev \
          libgtk-3-dev \
          libasound2-dev \
          cmake

    - name: Debug - Show project structure
      run: |
        echo "🔍 Projektstruktur:"
        find . -name "Cargo.toml" -type f | head -5
        echo ""
        echo "🔍 Config-Dateien:"
        find . -name "config.rs" -type f | head -5
        echo ""
        echo "🔍 Main src-Dateien:"
        ls -la src/ || echo "src/ Verzeichnis nicht gefunden"

    - name: Configure custom settings
      env:
        RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
        RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}
      run: |
        # Prüfe ob Secrets gesetzt sind
        if [ -z "${{ secrets.RENDEZVOUS_SERVER }}" ]; then
          echo "⚠️ RENDEZVOUS_SERVER Secret nicht gesetzt!"
        else
          echo "✅ RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}"
        fi
        
        if [ -z "${{ secrets.RS_PUB_KEY }}" ]; then
          echo "⚠️ RS_PUB_KEY Secret nicht gesetzt!"
        else
          echo "✅ RS_PUB_KEY: $(echo "${{ secrets.RS_PUB_KEY }}" | cut -c1-20)..."
        fi
        
        # Umgebungsvariablen für Build setzen
        echo "RENDEZVOUS_SERVER=${{ secrets.RENDEZVOUS_SERVER }}" >> $GITHUB_ENV
        echo "RS_PUB_KEY=${{ secrets.RS_PUB_KEY }}" >> $GITHUB_ENV
        
        # Suche und bearbeite Konfigurationsdateien
        echo "🔍 Suche nach config.rs Dateien..."
        find . -name "config.rs" -type f | while read file; do
          echo "📁 Gefundene config.rs: $file"
          
          if [ -f "$file" ]; then
            echo "🔧 Analysiere $file"
            
            # Prüfe auf relevante Konstanten
            if grep -q "RENDEZVOUS_SERVERS" "$file"; then
              echo "  📡 RENDEZVOUS_SERVERS Pattern gefunden"
            fi
            if grep -q "RS_PUB_KEY\|PUBLIC_RS_PUB_KEY" "$file"; then
              echo "  🔑 PUB_KEY Pattern gefunden"
            fi
            
            # Backup erstellen
            cp "$file" "$file.backup"
            
            # Server konfigurieren
            if grep -q "RENDEZVOUS_SERVERS" "$file" && [ -n "${{ secrets.RENDEZVOUS_SERVER }}" ]; then
              sed -i 's/pub const RENDEZVOUS_SERVERS: &\[&str\] = &\[.*\];/pub const RENDEZVOUS_SERVERS: \&[\&str] = \&["${{ secrets.RENDEZVOUS_SERVER }}"];/' "$file"
              echo "  ✅ RENDEZVOUS_SERVER konfiguriert"
            fi
            
            # Public Key konfigurieren
            if grep -q "RS_PUB_KEY\|PUBLIC_RS_PUB_KEY" "$file" && [ -n "${{ secrets.RS_PUB_KEY }}" ]; then
              sed -i 's/pub const \(RS_PUB_KEY\|PUBLIC_RS_PUB_KEY\): &str = ".*";/pub const \1: \&str = "${{ secrets.RS_PUB_KEY }}";/' "$file"
              echo "  ✅ RS_PUB_KEY konfiguriert"
            fi
          fi
        done

    - name: Try simple cargo build
      run: |
        echo "🚀 Versuche einfachen Cargo Build..."
        
        # Prüfe verfügbare Binaries
        if [ -f "Cargo.toml" ]; then
          echo "📋 Verfügbare Binaries in Cargo.toml:"
          grep -A 3 "\[\[bin\]\]" Cargo.toml || echo "Keine [[bin]] Definitionen gefunden"
        fi
        
        # Einfacher Build-Versuch
        echo "🦀 Starte: cargo build --release"
        if cargo build --release; then
          echo "✅ Cargo build erfolgreich!"
        else
          echo "❌ Cargo build fehlgeschlagen"
          exit_code=$?
          echo "Exit code: $exit_code"
        fi
        
        # Prüfe was gebaut wurde
        echo ""
        echo "📦 Gebaute Dateien:"
        if [ -d "target/release" ]; then
          find target/release -name "rustdesk*" -type f | while read file; do
            size=$(du -h "$file" | cut -f1)
            echo "  ✅ $file ($size)"
          done
        else
          echo "  ❌ target/release Verzeichnis nicht gefunden"
        fi
        
        # Prüfe andere mögliche Ausgabeverzeichnisse
        for dir in "target/debug" "out" "build"; do
          if [ -d "$dir" ]; then
            echo ""
            echo "📁 Inhalt von $dir:"
            find "$dir" -name "rustdesk*" -type f | head -5 | while read file; do
              echo "  - $(basename "$file")"
            done
          fi
        done

    - name: Upload any found executables
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: rustdesk-linux-any-executables
        path: |
          target/release/rustdesk*
          target/debug/rustdesk*
          **/rustdesk
        if-no-files-found: warn
